# Staging / VPS overlay.
#
# Run it WITHOUT the dev override by listing both files explicitly — passing -f
# disables the automatic load of docker-compose.override.yml, so the backend runs
# the production image (not nodemon):
#
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
#
# No --env-file is needed: the backend env_file directive below supplies the
# container environment. .env.production must sit next to these compose files.
services:
  backend:
    env_file:
      - .env.production

  buyer-app:
    build:
      args:
        # Vite inlines VITE_* at build time. Defaults to the VPS IP; override with
        # a shell var (or compose env file) e.g. VITE_API_URL=https://api.staging.example.com at M4.
        VITE_API_URL: ${VITE_API_URL:-http://69.30.250.67:5000}

  admin-app:
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:-http://69.30.250.67:5000}
